<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BodyTrace - New Entry Details</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-container": "#acc3ce",
              "primary-fixed": "#c7e7fa",
              "surface-container-highest": "#252626",
              "tertiary-container": "#9facf4",
              "secondary-dim": "#8ba1ac",
              outline: "#767575",
              surface: "#0e0e0e",
              "error-container": "#7f2927",
              "primary-dim": "#9ebdd0",
              "surface-container-low": "#131313",
              tertiary: "#aebaff",
              "on-primary-fixed-variant": "#425f70",
              "on-primary-fixed": "#254352",
              "tertiary-fixed": "#9facf4",
              "on-background": "#e7e5e5",
              "primary-container": "#2c4a5a",
              "on-error-container": "#ff9993",
              error: "#ee7d77",
              "on-tertiary": "#283575",
              "error-dim": "#bb5551",
              "surface-dim": "#0e0e0e",
              "on-tertiary-fixed-variant": "#263474",
              "surface-container": "#191a1a",
              "on-tertiary-container": "#1d2b6a",
              "primary-fixed-dim": "#bad9ec",
              "on-primary": "#254453",
              "secondary-fixed": "#cfe6f2",
              "surface-tint": "#accbde",
              primary: "#accbde",
              "tertiary-dim": "#929fe6",
              "on-secondary-fixed-variant": "#495f69",
              "on-error": "#490106",
              "surface-variant": "#252626",
              "inverse-primary": "#456373",
              background: "#0e0e0e",
              "surface-container-lowest": "#000000",
              secondary: "#8ba1ac",
              "inverse-on-surface": "#565555",
              "inverse-surface": "#fcf9f8",
              "on-surface-variant": "#acabaa",
              "on-primary-container": "#b5d5e8",
              "on-tertiary-fixed": "#000f4f",
              "tertiary-fixed-dim": "#929fe6",
              "surface-bright": "#2b2c2c",
              "on-surface": "#e7e5e5",
              "secondary-container": "#293e48",
              "surface-container-high": "#1f2020",
              "on-secondary": "#0d232b",
              "on-secondary-fixed": "#2d424c",
              "secondary-fixed-dim": "#c1d8e4",
              "outline-variant": "#484848",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #0e0e0e;
        color: #e7e5e5;
        font-family: "Inter", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .glass-panel {
        background: rgba(37, 38, 38, 0.6);
        backdrop-filter: blur(20px);
      }
      .vault-gradient {
        background: linear-gradient(135deg, #accbde 0%, #2c4a5a 100%);
      }
      /* Custom scrollbar for notes */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="min-h-screen pb-24">
    <!-- TopAppBar Shell (Suppressed Navigation - Back Context) -->
    <nav
      class="sticky top-0 z-50 flex w-full items-center justify-between bg-[#0e0e0e] px-10 py-6 dark:bg-[#0e0e0e]"
    >
      <div class="flex items-center gap-4">
        <button
          class="scale-95 text-[#accbde] transition-opacity duration-300 hover:opacity-80 active:duration-150"
        >
          <span class="material-symbols-outlined" data-icon="arrow_back"
            >arrow_back</span
          >
        </button>
        <h1
          class="font-manrope text-xl font-black tracking-tighter text-[#accbde]"
        >
          BodyTrace
        </h1>
      </div>
      <div class="flex items-center gap-6">
        <span
          class="font-manrope text-lg font-bold tracking-tight text-[#accbde]"
          >New Entry</span
        >
        <button class="text-[#accbde] transition-opacity hover:opacity-80">
          <span class="material-symbols-outlined" data-icon="more_vert"
            >more_vert</span
          >
        </button>
      </div>
    </nav>
    <main class="mx-auto mt-4 max-w-4xl px-6">
      <!-- Visual Context: Captured Photos -->
      <section class="mb-12">
        <div class="mb-6 flex items-end justify-between">
          <h2
            class="font-headline text-on-surface ml-4 text-2xl font-bold tracking-tight"
          >
            Visual Evidence
          </h2>
          <span
            class="font-label text-secondary text-[10px] uppercase tracking-[0.1em] opacity-60"
            >Locked in Vault</span
          >
        </div>
        <div class="grid grid-cols-2 gap-4 md:grid-cols-3">
          <!-- Front Shot -->
          <div
            class="bg-surface-container-low group relative aspect-[3/4] overflow-hidden rounded-xl"
          >
            <img
              class="h-full w-full object-cover opacity-80 grayscale transition-opacity duration-500 group-hover:opacity-100"
              data-alt="Monochrome cinematic portrait of a fit person standing against a dark studio background, front view, dramatic lighting"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuDQx2-iyYX4rE6jDjJijRnV7FMgn9fDw6vqgC4uTxSnK5HINUqRqtq4DDXxDex3wcgqS3C9I7y_jmqxRqpQr1vgX7q_bKkxmPY6ODenGn57hJZefEQ9vogIfspmBY-uqw2o01HOamKp68GHwyLVnGT6ay-PgQqP0KHzrPYUTp6C9haF7hyTz_LXneTxXY4Kz1B3r1U4F7hoB5ZrabBMVtJNbFyT73FKVi17Fpi6V8rvqmHJOPnAZIFBedUlWuL4alXuBC2fo-PgO3I"
            />
            <div class="glass-panel absolute bottom-0 left-0 w-full p-4">
              <span
                class="font-label text-primary text-[10px] uppercase tracking-wider"
                >Front</span
              >
            </div>
          </div>
          <!-- Side Shot -->
          <div
            class="bg-surface-container-low group relative aspect-[3/4] overflow-hidden rounded-xl"
          >
            <img
              class="h-full w-full object-cover opacity-80 grayscale transition-opacity duration-500 group-hover:opacity-100"
              data-alt="Side profile silhouette of an athletic individual in a dark fitness studio, focused lighting on muscle definition"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuBAE-RhMmCOyiANcYsicGSmzjHf5kGmyRdMg9Ng3AMY2kOzIHJf9RswHrZhEpz8CeMLhStovkW44-7t11dJP9xK-xZOKhp6FK0nWt3ypBIcKezZMj_w7mKrSl0BvIsF-JNcGrK0d4uEa0aJGSNuWjq9mgt11PGvUNs1CDhM7-vNzJbRFhmJrnlr3SOoHkZjF2-ja1t7dfGNhyCBub7SW03p3ZLG1a0dqwLgN9KuQwxJ04VlUa8dMVvF-w1EMhi87WWM7GfbVtsEjBA"
            />
            <div class="glass-panel absolute bottom-0 left-0 w-full p-4">
              <span
                class="font-label text-primary text-[10px] uppercase tracking-wider"
                >Profile</span
              >
            </div>
          </div>
          <!-- Back Shot (Hidden on mobile for layout asymmetry) -->
          <div
            class="bg-surface-container-low group relative hidden aspect-[3/4] overflow-hidden rounded-xl md:block"
          >
            <img
              class="h-full w-full object-cover opacity-80 grayscale transition-opacity duration-500 group-hover:opacity-100"
              data-alt="Athletic back muscles highlighted by high-contrast low-key lighting in a professional gym environment"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJC6aHyd-UYUhAcsAJZap4B0vFaSSNDpsk6YgbzL5FAeUjG3zAf0qUTPwBUCXncvZvn33DZyAIgxq0WS6UVnCXHFTervVSvOYxwNyBQwOXv1CypuVY7iIRNpQ0-Kl6MaYKf8Xy2iqF3c-mXjQ5Z0n651LJo8jDecnJ9IEEHXy7u_C0oZuRVtGb9agF1v_iW2cgs6itzb2123EWNjuP9PC6Ub0iK41LdHoieij1u1VdXc6jFx2gvm-6EiOdwE9ACIYXH0C4NbfVPds"
            />
            <div class="glass-panel absolute bottom-0 left-0 w-full p-4">
              <span
                class="font-label text-primary text-[10px] uppercase tracking-wider"
                >Back</span
              >
            </div>
          </div>
        </div>
      </section>
      <!-- Entry Form Section -->
      <section class="space-y-12">
        <!-- Metrics Grid -->
        <div class="grid grid-cols-1 gap-x-12 gap-y-10 md:grid-cols-2">
          <!-- Primary Metric: Weight -->
          <div
            class="bg-surface-container-low border-primary rounded-xl border-l-4 p-8 md:col-span-2"
          >
            <div class="mb-4 flex items-center justify-between">
              <label
                class="font-label text-secondary text-xs font-semibold uppercase tracking-widest"
                >Current Weight</label
              >
              <div class="flex gap-2">
                <button
                  class="bg-primary text-on-primary rounded-full px-3 py-1 text-[10px] font-bold"
                >
                  KG
                </button>
                <button
                  class="bg-surface-container text-outline rounded-full px-3 py-1 text-[10px] font-bold"
                >
                  LB
                </button>
              </div>
            </div>
            <div class="relative flex items-baseline">
              <input
                class="font-headline text-on-surface placeholder:text-surface-container-high w-full border-none bg-transparent p-0 text-5xl font-extrabold tracking-tighter focus:ring-0 md:text-6xl"
                placeholder="00.0"
                type="number"
              />
              <span class="font-headline text-primary ml-2 text-xl font-bold"
                >kg</span
              >
            </div>
          </div>
          <!-- Measurement: Chest -->
          <div class="group space-y-3">
            <label
              class="font-label text-outline-variant group-focus-within:text-primary text-[11px] uppercase tracking-widest transition-colors"
              >Chest Measurement</label
            >
            <div class="relative">
              <input
                class="border-outline-variant/20 focus:border-primary focus:bg-surface-container-low/30 font-headline w-full border-b bg-transparent px-0 py-4 text-2xl font-bold transition-all focus:ring-0"
                placeholder="--"
                type="number"
              />
              <span
                class="font-label text-outline absolute bottom-4 right-0 text-xs opacity-50"
                >cm</span
              >
            </div>
          </div>
          <!-- Measurement: Waist -->
          <div class="group space-y-3">
            <label
              class="font-label text-outline-variant group-focus-within:text-primary text-[11px] uppercase tracking-widest transition-colors"
              >Waist Measurement</label
            >
            <div class="relative">
              <input
                class="border-outline-variant/20 focus:border-primary focus:bg-surface-container-low/30 font-headline w-full border-b bg-transparent px-0 py-4 text-2xl font-bold transition-all focus:ring-0"
                placeholder="--"
                type="number"
              />
              <span
                class="font-label text-outline absolute bottom-4 right-0 text-xs opacity-50"
                >cm</span
              >
            </div>
          </div>
          <!-- Measurement: Hips -->
          <div class="group space-y-3 md:col-span-2">
            <label
              class="font-label text-outline-variant group-focus-within:text-primary text-[11px] uppercase tracking-widest transition-colors"
              >Hips Measurement</label
            >
            <div class="relative">
              <input
                class="border-outline-variant/20 focus:border-primary focus:bg-surface-container-low/30 font-headline w-full border-b bg-transparent px-0 py-4 text-2xl font-bold transition-all focus:ring-0"
                placeholder="--"
                type="number"
              />
              <span
                class="font-label text-outline absolute bottom-4 right-0 text-xs opacity-50"
                >cm</span
              >
            </div>
          </div>
        </div>
        <!-- Notes Section -->
        <div class="bg-surface-container-low/50 rounded-xl p-8">
          <div class="mb-6 flex items-center gap-3">
            <span
              class="material-symbols-outlined text-primary text-xl"
              data-icon="edit_note"
              >edit_note</span
            >
            <label
              class="font-label text-secondary text-xs font-semibold uppercase tracking-widest"
              >Evolution Notes</label
            >
          </div>
          <textarea
            class="text-on-surface-variant font-body placeholder:text-outline/40 w-full resize-none border-none bg-transparent p-0 leading-relaxed focus:ring-0"
            placeholder="How did you feel during this session? Note energy levels, muscle pump, or nutritional status..."
            rows="4"
          ></textarea>
        </div>
        <!-- Privacy Indicator -->
        <div
          class="bg-tertiary-container/10 mx-auto flex w-fit items-center justify-center gap-2 rounded-full px-6 py-4"
        >
          <span
            class="material-symbols-outlined text-tertiary text-sm"
            data-icon="lock"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >lock</span
          >
          <span
            class="font-label text-tertiary-container text-[10px] font-bold uppercase tracking-widest"
            >End-to-End Encrypted Trace</span
          >
        </div>
        <!-- Save Action -->
        <div class="pb-12 pt-8">
          <button
            class="vault-gradient text-on-primary font-headline flex w-full items-center justify-center gap-3 rounded-xl py-6 text-lg font-extrabold tracking-tight transition-all hover:brightness-110 active:scale-[0.98]"
          >
            Save Entry
            <span class="material-symbols-outlined" data-icon="check_circle"
              >check_circle</span
            >
          </button>
        </div>
      </section>
    </main>
    <!-- Bottom Navigation (Filtered: Should be suppressed on transactional focus but placeholder shown for shell integrity if desired) -->
    <!-- Applying Suppression Logic: This is a sub-page with a "Back" focus, so no global nav. Header back button is the primary exit. -->
    <!-- Floating Security Tag -->
    <div
      class="text-outline fixed bottom-10 left-10 hidden items-center gap-3 opacity-40 lg:flex"
    >
      <div class="bg-primary h-1 w-1 animate-pulse rounded-full"></div>
      <span class="font-label text-[9px] uppercase tracking-[0.2em]"
        >Vault Secure</span
      >
    </div>
  </body>
</html>
