<body class="bg-surface text-on-surface font-body selection:bg-primary/30 antialiased overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="w-full sticky top-0 z-50 flex items-center justify-between px-10 py-6 w-full bg-[#0e0e0e] dark:bg-[#0e0e0e]">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity duration-300 scale-95 active:duration-150 text-[#accbde]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope font-black text-xl text-[#accbde] tracking-tighter">BodyTrace</h1>
</div>
<div class="flex items-center gap-6">
<span class="font-inter text-[10px] uppercase tracking-[0.1em] font-bold text-primary px-3 py-1 bg-primary-container/30 rounded-full border border-outline-variant/10">Camera Active</span>
<button class="hover:opacity-80 transition-opacity duration-300 scale-95 active:duration-150 text-[#accbde]">

<!-- Instructions Overlay -->
<div class="absolute top-8 left-1/2 -translate-x-1/2 z-20 w-full max-w-md px-6">
<div class="bg-surface-container-low/80 backdrop-blur-md px-6 py-4 rounded-xl text-center border-b border-outline-variant/10">
<p class="font-headline font-bold text-primary tracking-tight text-lg mb-1">Align with previous pose</p>
<p class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Front Angle - July 12 Entry</p>
</div>
</div>
<!-- Angle Toggle Switch -->
<div class="absolute right-8 top-1/2 -translate-y-1/2 z-20 flex flex-col gap-4">
<button class="w-14 h-14 rounded-xl bg-primary text-on-primary flex items-center justify-center shadow-lg transition-all duration-300">
<span class="font-headline font-extrabold text-sm">FR</span>
</button>
<button class="w-14 h-14 rounded-xl bg-surface-container-high/60 backdrop-blur-sm text-on-surface-variant flex items-center justify-center hover:bg-surface-container-highest transition-all duration-300">
<span class="font-headline font-extrabold text-sm">SI</span>
</button>
<button class="w-14 h-14 rounded-xl bg-surface-container-high/60 backdrop-blur-sm text-on-surface-variant flex items-center justify-center hover:bg-surface-container-highest transition-all duration-300">
<span class="font-headline font-extrabold text-sm">BK</span>
</button>
</div>

</div>

</button>
</div>
<!-- Camera Swap -->

<span class="material-symbols-outlined" data-icon="flip_camera_ios">flip_camera_ios</span>
</button>
</div>
</div>

<div class="absolute inset-0 z-10 pointer-events-none grid grid-cols-3 grid-rows-3 opacity-10">
<div class="border-r border-b border-on-surface"></div>
<div class="border-r border-b border-on-surface"></div>
<div class="border-b border-on-surface"></div>
<div class="border-r border-b border-on-surface"></div>
<div class="border-r border-b border-on-surface"></div>
<div class="border-b border-on-surface"></div>
<div class="border-r border-on-surface"></div>

<div></div>
